---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shinka
  labels:
    app.kubernetes.io/name: shinka
    app.kubernetes.io/component: operator
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: shinka
      app.kubernetes.io/component: operator
  endpoints:
    - port: health
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
